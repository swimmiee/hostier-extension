<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>쿠팡 가져오기 권한</title>
  <style>
    html, body { height: 100%; }
    body { margin: 0; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #fff; color: #1c1c1c; box-sizing: border-box; display: flex; flex-direction: column; }
    h1 { font-size: 14px; margin: 0 0 6px; font-weight: 600; }
    p { font-size: 12px; color: #6f675d; margin: 0 0 14px; line-height: 1.45; }
    button { width: 100%; padding: 10px 12px; border-radius: 8px; border: 0; font-size: 13px; font-weight: 600; cursor: pointer; }
    .primary { background: #166534; color: #fff; }
    .primary:hover { background: #14532d; }
    .secondary { background: #f4f1ec; color: #1c1c1c; margin-top: 6px; }
    .secondary:hover { background: #e8e2d6; }
    .status { margin: 8px 0 0; font-size: 11px; color: #b91c1c; min-height: 1em; }
  </style>
</head>
<body>
  <h1>쿠팡 가져오기 권한</h1>
  <p>주문 내역을 가져오려면 쿠팡 사이트 접근 권한이 필요해요. "허용하기"를 누르고 Chrome 안내창에서도 허용해주세요.</p>
  <button id="grantBtn" class="primary" type="button">허용하기</button>
  <button id="cancelBtn" class="secondary" type="button">취소</button>
  <p id="status" class="status"></p>
  <script src="grant-coupang.js"></script>
</body>
</html>

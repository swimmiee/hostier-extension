<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>쿠팡 가져오기 권한</title>
  <style>
    body { margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #fff; color: #1c1c1c; }
    h1 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 13px; color: #6f675d; margin: 0 0 20px; line-height: 1.5; }
    button { width: 100%; padding: 12px 16px; border-radius: 10px; border: 0; font-size: 14px; font-weight: 600; cursor: pointer; }
    .primary { background: #166534; color: #fff; }
    .primary:hover { background: #14532d; }
    .secondary { background: #f4f1ec; color: #1c1c1c; margin-top: 8px; }
    .secondary:hover { background: #e8e2d6; }
    .status { margin-top: 12px; font-size: 12px; color: #b91c1c; min-height: 1em; }
  </style>
</head>
<body>
  <h1>쿠팡 가져오기 권한 허용</h1>
  <p>주문 내역을 불러오기 위해 쿠팡 사이트 접근 권한이 필요해요. 아래 버튼을 누르고 Chrome 안내창에서 허용해주세요.</p>
  <button id="grantBtn" class="primary" type="button">허용하기</button>
  <button id="cancelBtn" class="secondary" type="button">취소</button>
  <p id="status" class="status"></p>
  <script src="grant-coupang.js"></script>
</body>
</html>

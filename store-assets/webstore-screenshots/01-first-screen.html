<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Hostier Screenshot 1</title>
  <link rel="stylesheet" href="./mock-screens.css">
</head>
<body>
  <main class="poster">
    <section class="layout">
      <div class="copy">
        <div class="brand">
          <span class="brand-mark"><img src="./logo-mark.svg" alt=""></span>
          <span class="brand-name">Hostier</span>
        </div>
        <h1 class="title"><span class="title-line">플랫폼 계정을</span><span class="title-line">호스티어에 연결하세요</span></h1>
      </div>

      <div class="stage">
        <section class="browser">
          <div class="browser-bar">
            <div class="browser-dots"><span></span><span></span><span></span></div>
            <div class="browser-address"></div>
          </div>
          <div class="browser-content soft">
            <div class="web-grid">
              <section class="web-card">
                <h3>Hostier</h3>
                <div class="web-stack compact">
                  <div class="web-row soft">
                    <span class="web-tag ghost">.</span>
                    <div class="soft-copy">
                      <div class="soft-line wide"></div>
                      <div class="soft-line short"></div>
                    </div>
                  </div>
                  <div class="web-row soft">
                    <span class="web-tag ghost">.</span>
                    <div class="soft-copy">
                      <div class="soft-line mid"></div>
                      <div class="soft-line short"></div>
                    </div>
                  </div>
                  <div class="web-row soft">
                    <span class="web-tag ghost">.</span>
                    <div class="soft-copy">
                      <div class="soft-line wide"></div>
                      <div class="soft-line mid"></div>
                    </div>
                  </div>
                </div>
              </section>
              <section class="web-panel">
                <h3>연결 준비 상태</h3>
                <div class="metrics two">
                  <div class="metric"><strong>3</strong><span>플랫폼</span></div>
                  <div class="metric"><strong>1</strong><span>계정</span></div>
                </div>
              </section>
            </div>
          </div>
        </section>

        <section class="popup center">
          <header class="popup-header">
            <div>
              <div class="brand">
                <span class="brand-mark"><img src="./logo-mark.svg" alt=""></span>
                <span class="brand-name" style="font-size:31px;">Hostier</span>
              </div>
              <div class="popup-email">&nbsp;</div>
            </div>
          </header>
          <div class="popup-shell">
            <h2>플랫폼 연결</h2>
            <div class="platform-list">
              <div class="platform-row">
                <span class="state-dot connected"></span>
                <div>
                  <h3>33m2</h3>
                  <div class="sub">host@hostier.ai · 자동 유지 활성화됨</div>
                </div>
                <span class="action-pill">관리</span>
              </div>
              <div class="platform-row">
                <span class="state-dot"></span>
                <div>
                  <h3>Enkostay</h3>
                  <div class="sub">연결과 자동 갱신을 위해 권한이 필요합니다.</div>
                </div>
                <span class="action-pill primary">권한 허용</span>
              </div>
              <div class="platform-row">
                <span class="state-dot expired"></span>
                <div>
                  <h3>LiveAnywhere</h3>
                  <div class="sub">host@gmail.com · 만료됨</div>
                </div>
                <span class="action-pill">재연결</span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>

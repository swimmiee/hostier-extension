<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <img class="logo" src="logo-wordmark.svg" alt="Hostier 로고">
        <p class="email" id="userEmail"></p>
      </div>
    </header>

    <div class="status" id="status" hidden></div>

    <section class="view awaiting-view" id="awaitingView" hidden>
      <div class="awaiting-copy">
        <p class="awaiting-kicker" id="awaitingKicker"></p>
        <h1 class="awaiting-title" id="awaitingTitle"></h1>
        <p class="awaiting-body" id="awaitingBody"></p>
      </div>
      <div class="awaiting-actions">
        <button class="awaiting-btn primary" id="awaitingPrimary" type="button"></button>
        <button class="awaiting-btn secondary" id="awaitingSecondary" type="button"></button>
      </div>
    </section>

    <section class="loading-view" id="loadingView">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-text" id="loadingText">연결 상태를 불러오고 있습니다.</p>
    </section>

    <section class="guard" id="guard" hidden>
      <h1 class="guard-title" id="guardTitle"></h1>
      <p class="guard-body" id="guardBody"></p>
      <ul class="guard-list" id="guardList" hidden></ul>

      <label class="guard-check" id="guardCheckWrap" hidden>
        <input type="checkbox" id="guardCheckbox">
        <span id="guardCheckboxLabel"></span>
      </label>

      <div class="guard-actions">
        <button class="guard-btn secondary" id="guardSecondary" hidden></button>
        <button class="guard-btn primary" id="guardPrimary"></button>
      </div>

      <a class="guard-link" id="privacyLink" href="#" target="_blank" rel="noreferrer"></a>
    </section>

    <section class="view" id="listView" hidden>
      <div class="section-head">
        <h1 class="sr-only" id="listTitle"></h1>
        <p class="section-note" id="listIntro"></p>
      </div>
      <div class="platform-list" id="platformList"></div>
    </section>

    <section class="view detail-view" id="detailView" hidden>
      <button class="back-btn" id="detailBack" type="button">← 뒤로</button>
      <div class="section-head">
        <h1 class="section-title" id="detailTitle"></h1>
        <p class="section-subtitle" id="detailSummary"></p>
      </div>
      <div class="accounts-list" id="accountsList"></div>
      <div class="detail-actions">
        <button class="secondary-action" id="detailSafeLogout" type="button" hidden></button>
        <button class="primary-action" id="detailAddAccount" type="button"></button>
      </div>
    </section>

  </div>

  <script src="config.js"></script>
  <script src="flow-shared.js"></script>
  <script src="hostier-client-shared.js"></script>
  <script src="auth-bundle-shared.js"></script>
  <script src="connection-flow-shared.js"></script>
  <script src="connection-runner-shared.js"></script>
  <script src="popup-render-shared.js"></script>
  <script src="popup-guard-shared.js"></script>
  <script src="popup-flow-shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>

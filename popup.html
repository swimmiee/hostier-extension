<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="logo" src="logo-wordmark.svg" alt="Hostier 로고">
      <p class="email" id="userEmail"></p>
    </div>

    <div class="status" id="status" hidden></div>

    <section class="guard" id="guard" hidden>
      <p class="guard-eyebrow" id="guardEyebrow"></p>
      <h1 class="guard-title" id="guardTitle"></h1>
      <p class="guard-body" id="guardBody"></p>
      <ul class="guard-list" id="guardList" hidden></ul>

      <label class="guard-check" id="guardCheckWrap" hidden>
        <input type="checkbox" id="guardCheckbox">
        <span id="guardCheckboxLabel"></span>
      </label>

      <div class="guard-actions">
        <button class="guard-btn primary" id="guardPrimary"></button>
        <button class="guard-btn secondary" id="guardSecondary" hidden></button>
      </div>

      <a class="guard-link" id="privacyLink" href="#" target="_blank" rel="noreferrer"></a>
    </section>

    <div class="platforms">
      <div class="platform" id="platform-33m2">
        <span class="indicator" id="indicator-33m2">○</span>
        <div class="platform-info">
          <span class="name">33m2</span>
          <span class="meta" id="meta-33m2"></span>
        </div>
        <button class="connect-btn" id="btn-33m2"></button>
      </div>
      <div class="platform" id="platform-enkorstay">
        <span class="indicator" id="indicator-enkorstay">○</span>
        <div class="platform-info">
          <span class="name">EnkorStay</span>
          <span class="meta" id="meta-enkorstay"></span>
        </div>
        <button class="connect-btn" id="btn-enkorstay"></button>
      </div>
      <div class="platform" id="platform-liveanywhere">
        <span class="indicator" id="indicator-liveanywhere">○</span>
        <div class="platform-info">
          <span class="name">LiveAnywhere</span>
          <span class="meta" id="meta-liveanywhere"></span>
        </div>
        <button class="connect-btn" id="btn-liveanywhere"></button>
      </div>
    </div>

    <div class="footer">
      <a href="#" id="openWebsite"></a>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
